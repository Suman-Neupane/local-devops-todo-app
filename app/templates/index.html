<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Todo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --border: #334155;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at top right, #1e3a8a, transparent 40%),
                              radial-gradient(circle at bottom left, #312e81, transparent 40%);
        }

        .container {
            background-color: var(--container-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin-top: 0;
            font-weight: 600;
            text-align: center;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            background-color: rgba(15, 23, 42, 0.6);
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        button {
            padding: 0.75rem 1.25rem;
            border-radius: 0.5rem;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            font-size: 1rem;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-add {
            background-color: var(--primary);
            color: white;
        }

        .btn-add:hover {
            background-color: var(--primary-hover);
        }

        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background-color: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-content {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex: 1;
        }

        .task-checkbox {
            appearance: none;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid var(--primary);
            border-radius: 0.25rem;
            cursor: pointer;
            display: grid;
            place-content: center;
            transition: all 0.2s;
        }

        .task-checkbox::before {
            content: "";
            width: 0.65rem;
            height: 0.65rem;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            background-color: transform;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .task-checkbox:checked {
            background-color: var(--primary);
        }

        .task-checkbox:checked::before {
            transform: scale(1);
        }

        .task-text {
            transition: color 0.2s, text-decoration 0.2s;
            word-break: break-all;
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #94a3b8;
        }

        .btn-delete {
            background-color: transparent;
            color: #94a3b8;
            padding: 0.5rem;
            border-radius: 0.25rem;
        }

        .btn-delete:hover {
            color: var(--danger);
            background-color: rgba(239, 68, 68, 0.1);
        }

        .empty-state {
            text-align: center;
            color: #94a3b8;
            font-style: italic;
            padding: 1rem 0;
            display: none;
        }

        .task-list:empty + .empty-state {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DevOps Todo</h1>
        
        <form class="input-group" id="taskForm">
            <input type="text" id="taskInput" placeholder="What needs to be done?" required autocomplete="off">
            <button type="submit" class="btn-add">Add</button>
        </form>

        <ul class="task-list" id="taskList">
            <!-- Tasks will be injected here -->
        </ul>
        <div class="empty-state">No tasks yet. Add one above!</div>
    </div>

    <script>
        const API_URL = '/tasks';
        const taskForm = document.getElementById('taskForm');
        const taskInput = document.getElementById('taskInput');
        const taskList = document.getElementById('taskList');

        // Fetch tasks on load
        async function fetchTasks() {
            try {
                const response = await fetch(API_URL);
                const tasks = await response.json();
                renderTasks(tasks);
            } catch (error) {
                console.error('Error fetching tasks:', error);
            }
        }

        // Render all tasks
        function renderTasks(tasks) {
            taskList.innerHTML = '';
            tasks.forEach(task => {
                taskList.appendChild(createTaskElement(task));
            });
        }

        // Create a single task DOM element
        function createTaskElement(task) {
            const li = document.createElement('li');
            li.className = `task-item ${task.completed ? 'completed' : ''}`;
            li.dataset.id = task.id;

            li.innerHTML = `
                <label class="task-content">
                    <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} 
                           onchange="toggleTask('${task.id}', this.checked)">
                    <span class="task-text">${escapeHtml(task.title)}</span>
                </label>
                <button class="btn-delete" onclick="deleteTask('${task.id}', this)" aria-label="Delete">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 6h18"></path>
                        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                    </svg>
                </button>
            `;
            return li;
        }

        // Add a new task
        taskForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = taskInput.value.trim();
            if (!title) return;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title })
                });

                if (response.ok) {
                    const newTask = await response.json();
                    taskList.appendChild(createTaskElement(newTask));
                    taskInput.value = '';
                }
            } catch (error) {
                console.error('Error adding task:', error);
            }
        });

        // Toggle task completion
        async function toggleTask(id, completed) {
            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed })
                });

                if (response.ok) {
                    const item = document.querySelector(`li[data-id="${id}"]`);
                    if (completed) {
                        item.classList.add('completed');
                    } else {
                        item.classList.remove('completed');
                    }
                }
            } catch (error) {
                console.error('Error toggling task:', error);
            }
        }

        // Delete a task
        async function deleteTask(id, btn) {
            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    const item = btn.closest('li');
                    item.style.opacity = '0';
                    item.style.transform = 'translateY(-10px)';
                    setTimeout(() => item.remove(), 300);
                }
            } catch (error) {
                console.error('Error deleting task:', error);
            }
        }

        // Helper to prevent XSS
        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        // Initial load
        fetchTasks();
    </script>
</body>
</html>
